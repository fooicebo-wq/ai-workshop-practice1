<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏍️ 小機車衝衝衝</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body {
    background: #1a1a2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100dvh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    z-index: 10; color: #fff;
  }
  #score-display { font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 8px #f90; }
  #lives-display { font-size: 1.2rem; }
  #speed-display { font-size: 0.9rem; color: #aef; }
  canvas {
    display: block;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    image-rendering: pixelated;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,30,0.88);
    z-index: 20; color: #fff; text-align: center;
    padding: 24px;
  }
  #overlay h1 { font-size: 2.8rem; margin-bottom: 8px; }
  #overlay p  { font-size: 1rem; color: #ccc; margin-bottom: 24px; line-height: 1.6; }
  #overlay .big-score { font-size: 2rem; color: #f90; font-weight: bold; margin-bottom: 8px; }
  #overlay .hi-score  { font-size: 1rem; color: #aaa; margin-bottom: 24px; }
  .btn {
    padding: 14px 40px; border: none; border-radius: 50px;
    font-size: 1.2rem; font-weight: bold; cursor: pointer;
    background: linear-gradient(135deg, #f90, #e00);
    color: #fff; letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(255,100,0,0.5);
    transition: transform .1s;
  }
  .btn:active { transform: scale(0.95); }
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; height: 120px; z-index: 10;
  }
  .ctrl-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; transition: background .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<div id="ui">
  <div id="score-display">🏆 0</div>
  <div id="speed-display">速度 ×1.0</div>
  <div id="lives-display">❤️❤️❤️</div>
</div>

<canvas id="c"></canvas>

<div id="controls">
  <div class="ctrl-btn" id="btn-left">◀</div>
  <div class="ctrl-btn" id="btn-right">▶</div>
</div>

<div id="overlay">
  <h1>🏍️ 小機車<br>衝衝衝！</h1>
  <p>左右移動閃避障礙物<br>收集⭐金幣加分<br>碰到路障會扣血</p>
  <button class="btn" id="start-btn">開始遊戲</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay     = document.getElementById('overlay');
const startBtn    = document.getElementById('start-btn');
const scoreEl     = document.getElementById('score-display');
const livesEl     = document.getElementById('lives-display');
const speedEl     = document.getElementById('speed-display');
const btnLeft     = document.getElementById('btn-left');
const btnRight    = document.getElementById('btn-right');

// ── Canvas size ──────────────────────────────────────────────────
let W, H;
function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width  = rect.width  * devicePixelRatio;
  H = canvas.height = rect.height * devicePixelRatio;
}
resize();
window.addEventListener('resize', () => { resize(); if (!running) drawIdle(); });

// ── Game state ───────────────────────────────────────────────────
let score, lives, speed, frame, running, hiScore = 0;
let moto, obstacles, coins, particles, roadLines, clouds;
let keys = { left: false, right: false };
let invincible = 0;   // frames of invincibility after hit
let shakeFrames = 0;

// ── Road constants ───────────────────────────────────────────────
const LANES = 3;
function laneX(lane) { return W * (0.2 + lane * 0.3); }  // 3 lanes: 0,1,2
const MOTO_W = () => W * 0.12;
const MOTO_H = () => W * 0.18;

// ── Init ─────────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = 3; speed = 4; frame = 0; running = true;
  invincible = 0; shakeFrames = 0;
  moto = { lane: 1, x: laneX(1), y: H * 0.75, targetX: laneX(1), moving: false };
  obstacles = []; coins = []; particles = []; clouds = [];
  roadLines = Array.from({length: 8}, (_, i) => ({ y: i * H/8 }));
  for (let i = 0; i < 5; i++) spawnCloud(true);
  overlay.style.display = 'none';
  requestAnimationFrame(loop);
}

// ── Controls ─────────────────────────────────────────────────────
btnLeft.addEventListener('pointerdown',  () => { keys.left  = true;  btnLeft.classList.add('pressed'); });
btnLeft.addEventListener('pointerup',   () => { keys.left  = false; btnLeft.classList.remove('pressed'); });
btnLeft.addEventListener('pointerleave',() => { keys.left  = false; btnLeft.classList.remove('pressed'); });
btnRight.addEventListener('pointerdown', () => { keys.right = true;  btnRight.classList.add('pressed'); });
btnRight.addEventListener('pointerup',  () => { keys.right = false; btnRight.classList.remove('pressed'); });
btnRight.addEventListener('pointerleave',()=> { keys.right = false; btnRight.classList.remove('pressed'); });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  keys.left  = true;
  if (e.key === 'ArrowRight') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

startBtn.addEventListener('click', initGame);

// ── Spawners ─────────────────────────────────────────────────────
function spawnObstacle() {
  const lane = Math.floor(Math.random() * LANES);
  // make sure no two obstacles stack
  const recent = obstacles.filter(o => o.lane === lane && o.y < 0 && o.y > -H * 0.35);
  if (recent.length) return;
  obstacles.push({ lane, x: laneX(lane), y: -MOTO_H(), type: Math.random() < 0.3 ? 'cone' : 'car' });
}

function spawnCoin() {
  const lane = Math.floor(Math.random() * LANES);
  coins.push({ lane, x: laneX(lane), y: -20, collected: false });
}

function spawnCloud(init = false) {
  clouds.push({
    x: Math.random() * W,
    y: init ? Math.random() * H * 0.45 : -60,
    w: W * (0.15 + Math.random() * 0.2),
    speed: 0.4 + Math.random() * 0.5
  });
}

function spawnParticles(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const v = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*v, vy: Math.sin(angle)*v,
      life: 30 + Math.random()*20, color, size: 3 + Math.random()*4 });
  }
}

// ── Draw helpers ─────────────────────────────────────────────────
function drawRoad() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#0d0d2b');
  sky.addColorStop(1, '#1a1a5e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Ground
  const gnd = ctx.createLinearGradient(0, H * 0.55, 0, H);
  gnd.addColorStop(0, '#2c2c2c');
  gnd.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, H * 0.55, W, H * 0.45);

  // Road surface — simple perspective trapezoid
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(W*0.3, H*0.55);
  ctx.lineTo(W*0.7, H*0.55);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Road edges
  ctx.strokeStyle = '#fff8'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(W*0.3,H*0.55); ctx.lineTo(0,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.7,H*0.55); ctx.lineTo(W,H); ctx.stroke();

  // Dashed lane dividers
  roadLines.forEach(rl => {
    const t = rl.y / H;  // 0=top 1=bottom
    const cx = W * 0.5;
    // left divider
    const lx = W*0.3 + t*(W*0.2);
    const rx = W*0.7 + t*(W*0.3 - W*0.7 + W) - W*0.3*t; // simplified
    ctx.strokeStyle = '#fffd'; ctx.lineWidth = Math.max(2, t*6);
    ctx.setLineDash([H*0.05, H*0.04]);
    ctx.beginPath();
    ctx.moveTo(W*0.3 + t*(0 - W*0.3), H*0.55 + t*(H - H*0.55));
    ctx.lineTo(W*0.3 + t*(0 - W*0.3) + 1, H*0.55 + t*(H - H*0.55));
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Simpler lane marks (vertical dashes scrolling)
  ctx.strokeStyle = '#fff8';
  ctx.setLineDash([H*0.06, H*0.04]);
  for (let l = 1; l < LANES; l++) {
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W*(0.1 + l*0.27), H*0.56);
    ctx.lineTo(W*(0.0 + l*0.33 - 0.03), H*1.0);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawCloud(c) {
  ctx.fillStyle = 'rgba(180,180,220,0.25)';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, c.w, c.w*0.4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x - c.w*0.3, c.y + c.w*0.1, c.w*0.5, c.w*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x + c.w*0.3, c.y + c.w*0.1, c.w*0.5, c.w*0.3, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawMoto(x, y, inv) {
  const mw = MOTO_W(), mh = MOTO_H();
  const alpha = inv && Math.floor(frame/4)%2 === 0 ? 0.35 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  // Exhaust smoke
  if (frame % 4 === 0) {
    spawnParticles(x - mw*0.1, y + mh*0.3, '#aaa8', 1);
  }

  // Body
  ctx.fillStyle = '#e63';
  ctx.beginPath();
  ctx.roundRect(-mw*0.38, -mh*0.5, mw*0.76, mh*0.55, mw*0.15);
  ctx.fill();

  // Windshield
  ctx.fillStyle = '#8cf8';
  ctx.beginPath();
  ctx.moveTo(-mw*0.15, -mh*0.5);
  ctx.lineTo( mw*0.15, -mh*0.5);
  ctx.lineTo( mw*0.1,  -mh*0.25);
  ctx.lineTo(-mw*0.1,  -mh*0.25);
  ctx.closePath();
  ctx.fill();

  // Rider helmet
  ctx.fillStyle = '#f90';
  ctx.beginPath();
  ctx.ellipse(0, -mh*0.6, mw*0.22, mh*0.18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#8cf';
  ctx.beginPath();
  ctx.ellipse(mw*0.06, -mh*0.62, mw*0.1, mh*0.08, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(-mw*0.1, mh*0.25, mw*0.2, mh*0.12, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( mw*0.1, mh*0.25, mw*0.2, mh*0.12, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(-mw*0.1, mh*0.25, mw*0.2, mh*0.12, 0, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse( mw*0.1, mh*0.25, mw*0.2, mh*0.12, 0, 0, Math.PI*2); ctx.stroke();

  // Headlight
  ctx.fillStyle = '#ff8';
  ctx.beginPath();
  ctx.ellipse(0, -mh*0.48, mw*0.09, mh*0.05, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  const mw = MOTO_W(), mh = MOTO_H();
  const scale = 0.5 + (o.y / H) * 0.8;  // perspective scale
  ctx.save();
  ctx.translate(o.x, o.y);
  ctx.scale(scale, scale);
  if (o.type === 'cone') {
    ctx.fillStyle = '#f50';
    ctx.beginPath();
    ctx.moveTo(0, -mh*0.5);
    ctx.lineTo(mw*0.25, mh*0.3);
    ctx.lineTo(-mw*0.25, mh*0.3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-mw*0.25, -mh*0.05, mw*0.5, mh*0.1);
    ctx.fillRect(-mw*0.25,  mh*0.15, mw*0.5, mh*0.08);
  } else {
    // car obstacle
    ctx.fillStyle = '#559';
    ctx.fillRect(-mw*0.45, -mh*0.55, mw*0.9, mh*0.8);
    ctx.fillStyle = '#88cf';
    ctx.fillRect(-mw*0.35, -mh*0.5, mw*0.7, mh*0.35);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(-mw*0.4, mh*0.1, mw*0.18, mh*0.1);
    ctx.fillRect( mw*0.22, mh*0.1, mw*0.18, mh*0.1);
    // tail lights
    ctx.fillStyle = '#f00';
    ctx.fillRect(-mw*0.4, -mh*0.55, mw*0.15, mh*0.12);
    ctx.fillRect( mw*0.25, -mh*0.55, mw*0.15, mh*0.12);
  }
  ctx.restore();
}

function drawCoin(c) {
  if (c.collected) return;
  const r = W * 0.03;
  const pulse = 1 + 0.15 * Math.sin(frame * 0.15);
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(pulse, pulse);
  // glow
  const g = ctx.createRadialGradient(0,0,r*0.3,0,0,r*1.4);
  g.addColorStop(0,'rgba(255,220,0,0.8)');
  g.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0,0,r*1.4,0,Math.PI*2); ctx.fill();
  // coin
  ctx.fillStyle = '#fd0';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fa0';
  ctx.font = `bold ${r*1.2}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⭐', 0, 1);
  ctx.restore();
}

function drawParticle(p) {
  ctx.fillStyle = p.color;
  ctx.globalAlpha = p.life / 50;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size * (p.life/50), 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ── Collision check ──────────────────────────────────────────────
function collides(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── Main loop ────────────────────────────────────────────────────
function loop() {
  if (!running) return;
  frame++;
  update();
  draw();
  requestAnimationFrame(loop);
}

function update() {
  // Speed ramp
  speed = 4 + Math.floor(score / 200) * 0.8;
  speed = Math.min(speed, 18);

  // Lane switch
  if (keys.left  && moto.lane > 0 && !moto.moving) { moto.lane--; moto.targetX = laneX(moto.lane); moto.moving = true; }
  if (keys.right && moto.lane < LANES-1 && !moto.moving) { moto.lane++; moto.targetX = laneX(moto.lane); moto.moving = true; }
  const dx = moto.targetX - moto.x;
  moto.x += dx * 0.18;
  if (Math.abs(dx) < 2) { moto.x = moto.targetX; moto.moving = false; }

  // Score
  score += 1;
  scoreEl.textContent = '🏆 ' + score;
  speedEl.textContent = `速度 ×${(speed/4).toFixed(1)}`;

  // Road lines scroll (cosmetic)
  roadLines.forEach(rl => { rl.y += speed; if (rl.y > H) rl.y -= H; });

  // Clouds
  clouds.forEach(c => { c.y += c.speed; });
  clouds = clouds.filter(c => c.y < H * 0.6);
  if (Math.random() < 0.01) spawnCloud();

  // Spawn obstacles
  const spawnRate = Math.max(40, 100 - score / 30);
  if (frame % Math.floor(spawnRate) === 0) spawnObstacle();

  // Spawn coins
  if (frame % 60 === 0) spawnCoin();

  // Move obstacles
  obstacles.forEach(o => { o.y += speed * 1.2; });
  obstacles = obstacles.filter(o => o.y < H + 100);

  // Move coins
  coins.forEach(c => { c.y += speed; });
  coins = coins.filter(c => c.y < H + 50 && !c.collected);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Shake
  if (shakeFrames > 0) shakeFrames--;

  // Invincibility
  if (invincible > 0) invincible--;

  // Collision — obstacles
  const mw = MOTO_W(), mh = MOTO_H();
  const mx = moto.x - mw*0.3, my = moto.y - mh*0.4;
  if (invincible === 0) {
    for (let o of obstacles) {
      const scale = 0.5 + (o.y / H) * 0.8;
      const ow = mw * scale, oh = mh * scale * 0.6;
      if (collides(mx, my, mw*0.6, mh*0.8, o.x - ow/2, o.y - oh/2, ow, oh)) {
        lives--;
        livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
        invincible = 90;
        shakeFrames = 20;
        spawnParticles(moto.x, moto.y, '#f44', 20);
        if (lives <= 0) { running = false; setTimeout(gameOver, 400); }
        break;
      }
    }
  }

  // Collision — coins
  for (let c of coins) {
    if (collides(mx, my, mw*0.6, mh*0.8, c.x - W*0.04, c.y - W*0.04, W*0.08, W*0.08)) {
      c.collected = true;
      score += 50;
      spawnParticles(c.x, c.y, '#fd0', 12);
    }
  }
}

function draw() {
  ctx.save();
  if (shakeFrames > 0) {
    ctx.translate((Math.random()-0.5)*12, (Math.random()-0.5)*12);
  }

  ctx.clearRect(0, 0, W, H);
  drawRoad();
  clouds.forEach(drawCloud);
  roadLines; // already scrolled, lane lines baked into drawRoad
  coins.forEach(drawCoin);
  obstacles.forEach(drawObstacle);
  drawMoto(moto.x, moto.y, invincible > 0);
  particles.forEach(drawParticle);

  ctx.restore();
}

function drawIdle() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
}

function gameOver() {
  if (score > hiScore) hiScore = score;
  overlay.innerHTML = `
    <h1>💥 遊戲結束</h1>
    <div class="big-score">🏆 ${score} 分</div>
    <div class="hi-score">最高紀錄：${hiScore} 分</div>
    <p>速度達到 ×${(speed/4).toFixed(1)}<br>繼續努力！</p>
    <button class="btn" id="start-btn">再玩一次</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', initGame);
}

drawIdle();
</script>
</body>
</html>
